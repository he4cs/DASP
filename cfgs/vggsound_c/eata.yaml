    - {'audio': 'gaussian_noise'}
    - {'video': 'impulse_noise'}
    - {'video': 'defocus_blur'}
    - {'audio': 'traffic'}
    - {'video': 'glass_blur'}
    - {'video': 'motion_blur'}
    - {'audio': 'crowd'}
    - {'video': 'zoom_blur'}
    - {'video': 'snow'}
    - {'video': 'frost'}
    - {'audio': 'rain'}
    - {'video': 'fog'}
    - {'video': 'brightness'}
    - {'audio': 'thunder'}
    - {'video': 'contrast'}
    - {'video': 'elastic_transform'}
    - {'audio': 'wind'}
    - {'video': 'pixelate'}
    - {'video': 'jpeg_compression'}

    # S2: video corruptions
    # - {'video': 'gaussian_noise'}
    # - {'video': 'shot_noise'}
    # - {'video': 'impulse_noise'}
    # - {'video': 'defocus_blur'}
    # - {'video': 'glass_blur'}
