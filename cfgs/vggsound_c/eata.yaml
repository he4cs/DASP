MODEL:
  ADAPTATION: eata
  ARCH: cav-mae-ft
  CKPT_PATH: ckpt/cav-mae-ft-vgg.pth

TEST:
  BATCH_SIZE: 64

CORRUPTION:
  DATASET: vggsound
  NUM_EX: -1
  SEVERITY:
    - 5
  DOMAIN_SEQUENCE:
    # S1: interleaved modality corruptions
    - {'video': 'gaussian_noise'}
